workflows:
  android-build:
    name: Android Build
    environment:
      groups:
        - google_play

      vars:
        PACKAGE_NAME: "com.cubstechnical.admin"
        BUILD_SCRIPT_NAME: "BUILD_ANDROID_FIXED.bat"
    scripts:
      - name: Set up environment
        script: |
          echo "Setting up Android build environment..."
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          export ANDROID_HOME=$HOME/Android/Sdk
          export PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools
      - name: Install dependencies
        script: |
          echo "Installing Node.js dependencies..."
          npm install
      - name: Build Android APK
        script: |
          echo "Building Android APK..."
          cd android
          ./gradlew assembleDebug
          cd ..
      - name: Build Android Release APK
        script: |
          echo "Building Android Release APK..."
          cd android
          ./gradlew assembleRelease
          cd ..
      - name: List APK files
        script: |
          echo "Generated APK files:"
          find android/app/build/outputs/apk -name "*.apk" -exec ls -la {} \;
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
      email:
        recipients:
          - info@cubstechnical.com
        notify:
          success: true
          failure: true

  android-release:
    name: Android Release Build
    environment:
      groups:
        - google_play

      vars:
        PACKAGE_NAME: "com.cubstechnical.admin"
    scripts:
      - name: Set up environment
        script: |
          echo "Setting up Android release build environment..."
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          export ANDROID_HOME=$HOME/Android/Sdk
          export PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools
      - name: Install dependencies
        script: |
          echo "Installing Node.js dependencies..."
          npm install
      - name: Build Release APK
        script: |
          echo "Building Android Release APK..."
          cd android
          ./gradlew assembleRelease
          cd ..
      - name: Build Release AAB
        script: |
          echo "Building Android App Bundle..."
          cd android
          ./gradlew bundleRelease
          cd ..
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: production
      email:
        recipients:
          - info@cubstechnical.com
        notify:
          success: true
          failure: true

  ios-build-testing:
    name: iOS Build (Testing Only)
    environment:
      vars:
        BUNDLE_ID: "com.cubstechnical.admin"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
    scripts:
      - name: Set up iOS environment
        script: |
          echo "Setting up iOS build environment..."
          export XCODE_PROJECT_PATH="$XCODE_PROJECT"
          export XCODE_WORKSPACE_PATH="$XCODE_WORKSPACE"
          export XCODE_SCHEME_NAME="$XCODE_SCHEME"
          export BUNDLE_IDENTIFIER="$BUNDLE_ID"
      - name: Install Node.js dependencies
        script: |
          echo "Installing Node.js dependencies..."
          npm install
      - name: Install iOS dependencies
        script: |
          echo "Installing iOS dependencies..."
          cd ios
          pod install
          cd ..
      - name: Build iOS app for simulator
        script: |
          echo "Building iOS app for simulator testing..."
          cd ios
          xcodebuild -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath App/build \
            build
          cd ..
      - name: Create iOS archive (unsigned)
        script: |
          echo "Creating iOS archive for future signing..."
          cd ios
          xcodebuild -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath App/build/App.xcarchive \
            archive
          cd ..
      - name: List build artifacts
        script: |
          echo "iOS build artifacts:"
          find ios/App/build -name "*.app" -o -name "*.xcarchive" | head -10
    artifacts:
      - ios/App/build/App.xcarchive
      - ios/App/build/Debug-iphonesimulator/App.app
      - ios/App/build/Release-iphoneos/App.app
    publishing:
      email:
        recipients:
          - info@cubstechnical.com
        notify:
          success: true
          failure: true

  ios-release-ready:
    name: iOS Release Build (Ready for Publishing)
    environment:
      vars:
        BUNDLE_ID: "com.cubstechnical.admin"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
    scripts:
      - name: Set up iOS environment
        script: |
          echo "Setting up iOS release build environment..."
          export XCODE_PROJECT_PATH="$XCODE_PROJECT"
          export XCODE_WORKSPACE_PATH="$XCODE_WORKSPACE"
          export XCODE_SCHEME_NAME="$XCODE_SCHEME"
          export BUNDLE_IDENTIFIER="$BUNDLE_ID"
      - name: Install Node.js dependencies
        script: |
          echo "Installing Node.js dependencies..."
          npm install
      - name: Install iOS dependencies
        script: |
          echo "Installing iOS dependencies..."
          cd ios
          pod install
          cd ..
      - name: Build iOS app for release
        script: |
          echo "Building iOS app for release..."
          cd ios
          xcodebuild -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath App/build/App.xcarchive \
            archive
          cd ..
      - name: Export unsigned IPA
        script: |
          echo "Exporting unsigned IPA (ready for manual signing)..."
          cd ios
          xcodebuild -exportArchive \
            -archivePath App/build/App.xcarchive \
            -exportPath App/build/ipa \
            -exportOptionsPlist exportOptions-unsigned.plist
          cd ..
      - name: List release artifacts
        script: |
          echo "iOS release artifacts:"
          find ios/App/build -name "*.ipa" -o -name "*.xcarchive" | head -10
    artifacts:
      - ios/App/build/ipa/*.ipa
      - ios/App/build/App.xcarchive
    publishing:
      email:
        recipients:
          - info@cubstechnical.com
        notify:
          success: true
          failure: true

  ios-build-publishing:
    name: iOS Build (With Publishing)
    environment:
      vars:
        BUNDLE_ID: "com.cubstechnical.admin"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        # TestFlight configuration
        TESTFLIGHT_EMAIL: "info@cubstechnical.com"  # Your email
        TESTFLIGHT_FIRST_NAME: "binoy"              # Your first name
        TESTFLIGHT_LAST_NAME: "benjamin"            # Your last name
    scripts:
      - name: Set up iOS environment
        script: |
          echo "Setting up iOS build environment..."
          export XCODE_PROJECT_PATH="$XCODE_PROJECT"
          export XCODE_WORKSPACE_PATH="$XCODE_WORKSPACE"
          export XCODE_SCHEME_NAME="$XCODE_SCHEME"
          export BUNDLE_IDENTIFIER="$BUNDLE_ID"
      - name: Install Node.js dependencies
        script: |
          echo "Installing Node.js dependencies..."
          npm install
      - name: Set up iOS platform
        script: |
          echo "Setting up iOS platform..."
          # Remove existing iOS platform if it exists
          rm -rf ios
          # Add iOS platform
          npx cap add ios
          # Install dependencies
          cd ios
          pod install
          cd ..
      - name: Build iOS app
        script: |
          echo "Building iOS app..."
          cd ios
          xcodebuild -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath App/build/App.xcarchive \
            archive
          cd ..
      - name: Create Export Options
        script: |
          echo "Creating export options plist..."
          cd ios
          cat > exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>GQCYASP5XS</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          cd ..
      - name: Export iOS IPA
        script: |
          echo "Exporting iOS IPA..."
          cd ios
          xcodebuild -exportArchive \
            -archivePath App/build/App.xcarchive \
            -exportPath App/build/ipa \
            -exportOptionsPlist exportOptions.plist
          cd ..
    artifacts:
      - ios/App/build/ipa/*.ipa
      - ios/App/build/App.xcarchive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - info@cubstechnical.com
        notify:
          success: true
          failure: true

  ios-release-publishing:
    name: iOS Release Build (With Publishing)
    environment:
      vars:
        BUNDLE_ID: "com.cubstechnical.admin"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
    scripts:
      - name: Set up iOS environment
        script: |
          echo "Setting up iOS release build environment..."
          export XCODE_PROJECT_PATH="$XCODE_PROJECT"
          export XCODE_WORKSPACE_PATH="$XCODE_WORKSPACE"
          export XCODE_SCHEME_NAME="$XCODE_SCHEME"
          export BUNDLE_IDENTIFIER="$BUNDLE_ID"
      - name: Install Node.js dependencies
        script: |
          echo "Installing Node.js dependencies..."
          npm install
      - name: Install iOS dependencies
        script: |
          echo "Installing iOS dependencies..."
          cd ios
          pod install
          cd ..
      - name: Build iOS app for release
        script: |
          echo "Building iOS app for release..."
          cd ios
          xcodebuild -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath App/build/App.xcarchive \
            archive
          cd ..
      - name: Export iOS IPA for release
        script: |
          echo "Exporting iOS IPA for release..."
          cd ios
          xcodebuild -exportArchive \
            -archivePath App/build/App.xcarchive \
            -exportPath App/build/ipa \
            -exportOptionsPlist exportOptions.plist
          cd ..
    artifacts:
      - ios/App/build/ipa/*.ipa
      - ios/App/build/App.xcarchive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - info@cubstechnical.com
        notify:
          success: true
          failure: true
