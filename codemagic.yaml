workflows:
  android-build:
    name: Android Build
    environment:
      groups:
        - google_play

      vars:
        PACKAGE_NAME: "com.cubstechnical.admin"
        BUILD_SCRIPT_NAME: "BUILD_ANDROID_FIXED.bat"
    scripts:
      - name: Set up environment
        script: |
          echo "Setting up Android build environment..."
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          export ANDROID_HOME=$HOME/Android/Sdk
          export PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools
      - name: Install dependencies
        script: |
          echo "Installing Node.js dependencies..."
          npm install
      - name: Build Android APK
        script: |
          echo "Building Android APK..."
          cd android
          ./gradlew assembleDebug
          cd ..
      - name: Build Android Release APK
        script: |
          echo "Building Android Release APK..."
          cd android
          ./gradlew assembleRelease
          cd ..
      - name: List APK files
        script: |
          echo "Generated APK files:"
          find android/app/build/outputs/apk -name "*.apk" -exec ls -la {} \;
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
      email:
        recipients:
          - info@cubstechnical.com
        notify:
          success: true
          failure: true

  android-release:
    name: Android Release Build
    environment:
      groups:
        - google_play

      vars:
        PACKAGE_NAME: "com.cubstechnical.admin"
    scripts:
      - name: Set up environment
        script: |
          echo "Setting up Android release build environment..."
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          export ANDROID_HOME=$HOME/Android/Sdk
          export PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools
      - name: Install dependencies
        script: |
          echo "Installing Node.js dependencies..."
          npm install
      - name: Build Release APK
        script: |
          echo "Building Android Release APK..."
          cd android
          ./gradlew assembleRelease
          cd ..
      - name: Build Release AAB
        script: |
          echo "Building Android App Bundle..."
          cd android
          ./gradlew bundleRelease
          cd ..
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: production
      email:
        recipients:
          - info@cubstechnical.com
        notify:
          success: true
          failure: true

  ios-build-testing:
    name: iOS Build (Testing Only - Automatic Signing)
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.cubstechnical.admin"
    scripts:
      - name: Install Node.js dependencies
        script: |
          echo "Installing Node.js dependencies..."
          npm install
      - name: Set up iOS platform
        script: |
          echo "Setting up iOS platform..."
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Install iOS dependencies
        script: |
          echo "Installing iOS dependencies..."
          cd ios/App
          pod install
          cd ../..
      - name: Verify automatic signing setup
        script: |
          echo "Verifying automatic code signing is enabled..."
          echo "Bundle ID: com.cubstechnical.admin"
          echo "Distribution: app_store"
          echo "✅ Ready for automatic signing and IPA export"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive.xcarchive
    publishing:
      email:
        recipients:
          - info@cubstechnical.com
        notify:
          success: true
          failure: true

  ios-release-ready:
    name: iOS Release Build (Ready for Publishing)
    environment:
      vars:
        BUNDLE_ID: "com.cubstechnical.admin"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
    scripts:
      - name: Set up iOS environment
        script: |
          echo "Setting up iOS release build environment..."
          export XCODE_PROJECT_PATH="$XCODE_PROJECT"
          export XCODE_WORKSPACE_PATH="$XCODE_WORKSPACE"
          export XCODE_SCHEME_NAME="$XCODE_SCHEME"
          export BUNDLE_IDENTIFIER="$BUNDLE_ID"
      - name: Install Node.js dependencies
        script: |
          echo "Installing Node.js dependencies..."
          npm install
      - name: Install iOS dependencies
        script: |
          echo "Installing iOS dependencies..."
          cd ios
          pod install
          cd ..
      - name: Build iOS app for release
        script: |
          echo "Building iOS app for release..."
          cd ios
          xcodebuild -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath App/build/App.xcarchive \
            archive
          cd ..
      - name: Export unsigned IPA
        script: |
          echo "Exporting unsigned IPA (ready for manual signing)..."
          cd ios
          xcodebuild -exportArchive \
            -archivePath App/build/App.xcarchive \
            -exportPath App/build/ipa \
            -exportOptionsPlist exportOptions-unsigned.plist
          cd ..
      - name: List release artifacts
        script: |
          echo "iOS release artifacts:"
          find ios/App/build -name "*.ipa" -o -name "*.xcarchive" | head -10
    artifacts:
      - ios/App/build/ipa/*.ipa
      - ios/App/build/App.xcarchive
    publishing:
      email:
        recipients:
          - info@cubstechnical.com
        notify:
          success: true
          failure: true

  ios-build-publishing:
    name: iOS Build (With Publishing)
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.cubstechnical.admin"
    scripts:
      - name: Install Node.js dependencies
        script: |
          echo "Installing Node.js dependencies..."
          npm install
      - name: Set up iOS platform
        script: |
          echo "Setting up iOS platform..."
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Install iOS dependencies
        script: |
          echo "Installing iOS dependencies..."
          cd ios/App
          pod install
          cd ../..
      - name: Verify automatic signing setup
        script: |
          echo "Verifying automatic code signing is enabled..."
          echo "Bundle ID: com.cubstechnical.admin"
          echo "Distribution: app_store"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive.xcarchive
    publishing:
      email:
        recipients:
          - info@cubstechnical.com
        notify:
          success: true
          failure: true

  ios-release-publishing:
    name: iOS Release Build (With Publishing)
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.cubstechnical.admin"
    scripts:
      - name: Install Node.js dependencies
        script: |
          echo "Installing Node.js dependencies..."
          npm install
      - name: Set up iOS platform
        script: |
          echo "Setting up iOS platform..."
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Install iOS dependencies
        script: |
          echo "Installing iOS dependencies..."
          cd ios/App
          pod install
          cd ../..
      - name: Verify automatic signing setup
        script: |
          echo "Verifying automatic code signing is enabled..."
          echo "Bundle ID: com.cubstechnical.admin"
          echo "Distribution: app_store"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive.xcarchive
    publishing:
      app_store_connect:
        # App Store Connect API key will be configured in Codemagic dashboard
        submit_to_app_store: true
        submit_to_testflight: false
      email:
        recipients:
          - info@cubstechnical.com
        notify:
          success: true
          failure: true
