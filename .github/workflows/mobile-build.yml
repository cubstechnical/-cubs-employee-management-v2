name: Build Mobile Apps

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'both'
        type: choice
        options:
        - android
        - ios
        - both

jobs:
  build-android:
    runs-on: ubuntu-latest
    if: github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' || (github.event.inputs.platform == null && github.ref == 'refs/heads/main')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup environment variables
      run: |
        cp env.example .env
        echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env
        echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
        echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env
        echo "GMAIL_USER=${{ secrets.GMAIL_USER }}" >> .env
        echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> .env
        echo "GMAIL_FROM_NAME=${{ secrets.GMAIL_FROM_NAME }}" >> .env
        echo "B2_APPLICATION_KEY_ID=${{ secrets.B2_APPLICATION_KEY_ID }}" >> .env
        echo "B2_APPLICATION_KEY=${{ secrets.B2_APPLICATION_KEY }}" >> .env
        echo "B2_BUCKET_NAME=${{ secrets.B2_BUCKET_NAME }}" >> .env
        echo "B2_ENDPOINT=${{ secrets.B2_ENDPOINT }}" >> .env
        echo "B2_BUCKET_ID=${{ secrets.B2_BUCKET_ID }}" >> .env
        echo "NODE_ENV=production" >> .env

    - name: Build mobile app
      run: npm run build:mobile

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug
        ./gradlew bundleRelease

    - name: Upload Android artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-build
        path: |
          android/app/build/outputs/apk/debug/
          android/app/build/outputs/bundle/release/
        retention-days: 30

  build-ios:
    runs-on: macos-latest
    if: github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' || (github.event.inputs.platform == null && github.ref == 'refs/heads/main')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup environment variables
      run: |
        cp env.example .env
        echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env
        echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
        echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env
        echo "GMAIL_USER=${{ secrets.GMAIL_USER }}" >> .env
        echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> .env
        echo "GMAIL_FROM_NAME=${{ secrets.GMAIL_FROM_NAME }}" >> .env
        echo "B2_APPLICATION_KEY_ID=${{ secrets.B2_APPLICATION_KEY_ID }}" >> .env
        echo "B2_APPLICATION_KEY=${{ secrets.B2_APPLICATION_KEY }}" >> .env
        echo "B2_BUCKET_NAME=${{ secrets.B2_BUCKET_NAME }}" >> .env
        echo "B2_ENDPOINT=${{ secrets.B2_ENDPOINT }}" >> .env
        echo "B2_BUCKET_ID=${{ secrets.B2_BUCKET_ID }}" >> .env
        echo "NODE_ENV=production" >> .env

    - name: Build mobile app
      run: npm run build:mobile

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'

    - name: Create export options plist
      run: |
        cd ios/App
        cat > exportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
        </dict>
        </plist>
        EOF

    - name: Install iOS dependencies
      run: |
        cd ios/App
        pod install

    - name: Build iOS app
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -destination 'generic/platform=iOS' -archivePath $PWD/App.xcarchive archive
        xcodebuild -exportArchive -archivePath $PWD/App.xcarchive -exportPath $PWD/build -exportOptionsPlist exportOptions.plist

    - name: Upload iOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: ios/App/build/
        retention-days: 30

  deploy-preview:
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Download Android artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-build
        path: android-artifacts

    - name: Download iOS artifacts
      uses: actions/download-artifact@v4
      with:
        name: ios-build
        path: ios-artifacts

    - name: Create deployment summary
      run: |
        echo "## Mobile App Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "### Android Build" >> $GITHUB_STEP_SUMMARY
        echo "- APK: Available in artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- AAB: Available in artifacts" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### iOS Build" >> $GITHUB_STEP_SUMMARY
        echo "- IPA: Available in artifacts" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "1. Download artifacts for testing" >> $GITHUB_STEP_SUMMARY
        echo "2. Test on physical devices" >> $GITHUB_STEP_SUMMARY
        echo "3. Submit to app stores when ready" >> $GITHUB_STEP_SUMMARY